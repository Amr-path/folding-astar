name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check folding_astar tests

      - name: Type-check (mypy)
        run: mypy folding_astar

      - name: Run tests
        run: pytest -v --cov=folding_astar --cov-report=term-missing

      - name: Verify worked-examples self-check
        run: python -c "from folding_astar.examples import ALL_EXAMPLES; print(f'{len(ALL_EXAMPLES)} examples self-checked at import')"
